(function(){

// ── SOUND ENGINE ──
var dhAC=null,dhMG=null,dhSon=false;
function dhInitAudio(){
  if(dhAC)return;

  dhMG=dhAC.createGain();dhMG.gain.value=0;dhMG.connect(dhAC.destination);
  // Singing bowl: fundamental + harmonics with slow beating
  var freqs=[110,220,329.6,440,550];
  freqs.forEach(function(f,i){
    var osc=dhAC.createOscillator();
    osc.type='sine';osc.frequency.value=f;
    var g=dhAC.createGain();g.gain.value=[0.06,0.04,0.025,0.015,0.008][i];
    // LFO for gentle pulsing
    var lfo=dhAC.createOscillator();
    lfo.frequency.value=0.04+i*0.01;
    var lg=dhAC.createGain();lg.gain.value=g.gain.value*0.3;
    lfo.connect(lg);lg.connect(g.gain);
    lfo.start();osc.connect(g);g.connect(dhMG);osc.start();
  });
  // Subtle low wind
  var buf=dhAC.createBuffer(1,dhAC.sampleRate*4,dhAC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  var src=dhAC.createBufferSource();src.buffer=buf;src.loop=true;
  var filt=dhAC.createBiquadFilter();filt.type='lowpass';filt.frequency.value=120;
  var wg=dhAC.createGain();wg.gain.value=0.008;
  src.connect(filt);filt.connect(wg);wg.connect(dhMG);src.start();
}
function dhToggleSnd(){
  dhInitAudio();
  if(dhAC.state==='suspended')dhAC.resume();
  dhSon=!dhSon;
  var t=dhAC.currentTime;
  dhMG.gain.cancelScheduledValues(t);
  dhMG.gain.setValueAtTime(dhMG.gain.value,t);
  dhMG.gain.linearRampToValueAtTime(dhSon?0.55:0,t+2);
  var btn=document.getElementById('dh-snd-btn');
  if(btn)btn.classList.toggle('dh-snd-on',dhSon);
}
function dhStartSnd(){
  setTimeout(function(){
    try{
      dhInitAudio();
      if(dhAC.state==='suspended')dhAC.resume();
      if(!dhSon){
        dhSon=true;
        var t=dhAC.currentTime;
        dhMG.gain.setValueAtTime(0,t);
        dhMG.gain.linearRampToValueAtTime(0.55,t+3);
        var btn=document.getElementById('dh-snd-btn');
        if(btn)btn.classList.add('dh-snd-on');
      }
    }catch(e){}
  },800);
}

// ── STARFIELD (outside #dq, no position:static conflict) ──
function dhInitStars(){
  var canvas=document.getElementById('dh-stars-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  var ctx=canvas.getContext('2d');
  var stars=[];
  for(var i=0;i<260;i++){
    stars.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*1.5+0.2,
      a:Math.random()*0.8+0.1,
      sp:Math.random()*0.005+0.001,
      ph:Math.random()*Math.PI*2
    });
  }
  var fr=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(function(s){
      var alpha=s.a*(0.5+0.5*Math.sin(fr*s.sp+s.ph));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,240,'+alpha.toFixed(2)+')';
      ctx.fill();
    });
    fr++;
    requestAnimationFrame(draw);
  }
  draw();
}

function dhAnimTitle(){
  dhInitStars();
  var seq=[
    {id:'dhi-btag',delay:300},
    {id:'dhi-ded',delay:900},
    {id:'dhi-title',delay:1600},
    {id:'dhi-rule',delay:2400},
    {id:'dhi-poem',delay:3000},
    {id:'dhi-poem2',delay:4200},
    {id:'dh-start-btn',delay:5300},
    {id:'dhi-note',delay:5800}
  ];
  seq.forEach(function(item){
    setTimeout(function(){
      var el=document.getElementById(item.id);
      if(el)el.classList.add('dhi-visible');
    },item.delay);
  });
}

// Wire start button — dismiss overlay and show quiz
document.addEventListener('DOMContentLoaded',function(){
  dhAnimTitle();
  var btn=document.getElementById('dh-start-btn');
  if(btn){
    btn.addEventListener('click',function(){
      dhStartSnd();
      var overlay=document.getElementById('dh-intro-overlay');
      if(overlay){
        overlay.classList.add('dh-hiding');
        setTimeout(function(){overlay.style.display='none';},1000);
      }
      dhSv('dqz');
      dhRend(0);
    });
  }
});
