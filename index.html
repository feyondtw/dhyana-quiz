// ── PAGE SWITCH ──
function dhSv(id){
  var ids=['di','dqz','dtr','drs'];
  for(var i=0;i<ids.length;i++){var e=document.getElementById(ids[i]);if(e){e.classList.remove('don');e.style.display='none';}}
  var t=document.getElementById(id);
  if(t){
    t.classList.add('don');
    t.style.display='';
    t.style.background='#0E1A3A';
    t.style.minHeight='100vh';
  }
  var dq=document.getElementById('dq');
  if(dq){dq.style.background='#0E1A3A';}
  var top=document.getElementById('dq');
  if(top)top.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── QUESTION FADE ──
function dhFadeQ(fn){
  var qb=document.getElementById('dqb');
  if(!qb){fn();return;}
  qb.style.transition='opacity .25s ease';
  qb.style.opacity='0';
  setTimeout(function(){fn();qb.style.opacity='0';setTimeout(function(){qb.style.transition='opacity .35s ease';qb.style.opacity='1';},30);},250);
}

// ── PROGRESS ──
function upProg(s){
  var pf=document.getElementById('dpf');
  if(pf)pf.style.width=Math.round(s/Qs.length*100)+'%';
  ['dp0','dp1','dp2'].forEach(function(id,i){
    var e=document.getElementById(id);
    if(e)e.className='dpl'+(i===s?' dcur':i<s?' ddone':'');
  });
}

// ── RENDER QUESTION ──
function dhRend(s){
  step=s; upProg(s);
  var q=Qs[s],sel=ans[q.id]||null;
  var h='<span class="dqeye">'+q.eye+'</span>';
  h+='<span class="dqhead" style="display:block">'+q.head+'</span>';
  h+='<span class="dqsub">'+q.sub+'</span>';
  h+='<div class="dopts">';
  for(var j=0;j<q.opts.length;j++){
    var o=q.opts[j],isSel=sel===o.k;
    h+='<button type="button" class="dopt'+(isSel?' dsel':'')+'" data-qid="'+q.id+'" data-k="'+o.k+'">';
    h+='<span class="doptic">'+o.ic+'</span>';
    h+='<span style="display:block"><span class="dopnm">'+o.nm+(o.eg?'<span class="dopeng">'+o.eg+'</span>':'')+'</span>';
    h+='<span class="dopdt">'+o.dt+'</span></span></button>';
  }
  h+='</div><div class="dnav">';
  h+='<button type="button" id="dbk" class="dbbk" style="visibility:'+(s===0?'hidden':'visible')+'">← 上一題</button>';
  h+='<button type="button" id="dbn" class="dbnxt"'+(sel?'':' disabled')+'>'+( s<Qs.length-1?'下一題 →':'查看我的配方 →')+'</button>';
  h+='</div>';
  var qb=document.getElementById('dqb');if(qb)qb.innerHTML=h;
}

  sp.forEach(function(s,i){
    var l=s[0],t=s[1],sz=s[2],op=s[3],dur=s[4],del=s[5],rot=s[6];
    var anim=i%2===0?'gleam':'gleam2';
    // Gold color with slight warmth variation
    var r=200+Math.floor(Math.random()*30);
    var g=160+Math.floor(Math.random()*30);
    var b=40+Math.floor(Math.random()*25);
    var col='rgba('+r+','+g+','+b+','+op+')';
    var glow='rgba('+(r+20)+','+(g+20)+','+b+','+Math.min(op*0.4,1).toFixed(2)+')';
    html+='<div style="position:absolute;left:'+l+'%;top:'+t+'%;width:'+sz+'px;height:'+sz+'px;background:'+col+';clip-path:'+starClip+';animation:'+anim+' '+dur+'s ease-in-out -'+del+'s infinite;margin:-'+(sz/2)+'px 0 0 -'+(sz/2)+'px;transform:rotate('+rot+'deg);filter:drop-shadow(0 0 '+(sz*0.35)+'px '+glow+')"></div>';

  // Small cream dots for depth
  for(var i=0;i<70;i++){
    var x=(Math.random()*98+1).toFixed(1);

  }

  container.innerHTML=html;

// ── EVENT DELEGATION ──
document.addEventListener('click',function(e){
  var t=e.target;
  // overlay start btn
  var ob=document.getElementById('dh-start-btn');
  if(ob&&(t===ob||ob.contains(t))){
    var overlay=document.getElementById('dh-intro-overlay');
    if(overlay){overlay.classList.add('dh-hiding');setTimeout(function(){overlay.style.display='none';},1000);}
    dhSv('dqz');dhRend(0);return;
  }
  // option
  var opt=t.closest?t.closest('[data-qid]'):null;
  if(opt){
    var qid=opt.getAttribute('data-qid'),k=opt.getAttribute('data-k');
    if(qid&&k){
      ans[qid]=k;
      var opts=document.querySelectorAll('#dqb .dopt');
      for(var i=0;i<opts.length;i++)opts[i].classList.remove('dsel');
      opt.classList.add('dsel');
      var nb=document.getElementById('dbn');if(nb)nb.removeAttribute('disabled');
    }
    return;
  }
  // next
  var nb2=document.getElementById('dbn');
  if(nb2&&(t===nb2||nb2.contains(t))){
    if(!ans[Qs[step].id])return;
    if(step<Qs.length-1){dhFadeQ(function(){dhRend(step+1);});}
    else{dhSv('dtr');setTimeout(dhBR,1800);}
    return;
  }
  // back
  var bk=document.getElementById('dbk');
  if(bk&&(t===bk||bk.contains(t))){dhFadeQ(function(){if(step>0)dhRend(step-1);});return;}
  // restart
  var rs=document.getElementById('drst');
  if(rs&&(t===rs||rs.contains(t))){ans={};step=0;dhSv('dqz');dhRend(0);return;}
},true);

// ── INIT ──
setTimeout(function(){dhInitStars();},0);
window.addEventListener('load',function(){
  var c=document.getElementById('dh-stars-canvas');
  if(c&&c.children.length===0)dhInitStars();
});

})();
