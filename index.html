var ritual=['睡前 60 分鐘，將精油滴入電動擴香儀，讓植物分子先行溫潤整個空間','或稀釋於辣木籽油（Moringa Oil）中，輕輕按摩雙腳心，讓根部的能量落地','噴霧輕噴於枕頭背面，讓氣味在夜間緩緩陪伴而不過於直接','關燈後做三次深呼吸，讓嗅覺神經接收植物的訊號，引導神經系統切換'];
var step=0,ans={};

function dhSv(id){
  var ids=['di','dqz','dtr','drs'];
  for(var i=0;i<ids.length;i++){var e=document.getElementById(ids[i]);if(e){e.classList.remove('don');e.style.display='none';}}
  var t=document.getElementById(id);
  if(t){t.classList.add('don');t.style.display='';}
  var top=document.getElementById('dq');
  if(top)top.scrollIntoView({behavior:'smooth',block:'start'});
}

function dhRend(s){
  step=s;
  var pf=document.getElementById('dpf');
  if(pf)pf.style.width=Math.round(s/Qs.length*100)+'%';
  var lbs=['dp0','dp1','dp2'];
  for(var i=0;i<lbs.length;i++){var e=document.getElementById(lbs[i]);if(e)e.className='dpl'+(i===s?' dcur':i<s?' ddone':'');}
  var q=Qs[s],sel=ans[q.id]||null;
  var h='';
  h+='<span class="dqeye">'+q.eye+'</span>';
  h+='<span class="dqhead" style="display:block">'+q.head+'</span>';
  h+='<span class="dqsub">'+q.sub+'</span>';
  h+='<div class="dopts">';
  for(var j=0;j<q.opts.length;j++){
    var o=q.opts[j],isSel=sel===o.k;
    h+='<button type="button" class="dopt'+(isSel?' dsel':'')+'" data-qid="'+q.id+'" data-k="'+o.k+'">';
    h+='<span class="doptic">'+o.ic+'</span>';
    h+='<span style="display:block"><span class="dopnm">'+o.nm+(o.eg?'<span class="dopeng">'+o.eg+'</span>':'')+'</span>';
    h+='<span class="dopdt">'+o.dt+'</span></span></button>';
  }
  h+='</div>';
  h+='<div class="dnav">';
  h+='<button type="button" id="dbk" class="dbbk" style="visibility:'+(s===0?'hidden':'visible')+'">← 上一題</button>';
  h+='<button type="button" id="dbn" class="dbnxt"'+(sel?'':' disabled')+'>'+( s<Qs.length-1?'下一題 →':'查看我的配方 →')+'</button>';
  h+='</div>';
  var qb=document.getElementById('dqb');if(qb)qb.innerHTML=h;
}


















// ── Event delegation: no inline onclick needed ──
document.addEventListener('click',function(e){
  var t=e.target;
  // start
  var sb=document.getElementById('dh-start-btn');
  if(sb&&(t===sb||sb.contains(t))){dhSv('dqz');dhRend(0);return;}
  // option
  var opt=t.closest?t.closest('[data-qid]'):null;
  if(!opt&&t.dataset&&t.dataset.qid)opt=t;
  if(opt){
    var qid=opt.getAttribute('data-qid'),k=opt.getAttribute('data-k');
    if(qid&&k){
      ans[qid]=k;
      var opts=document.querySelectorAll('#dqb .dopt');
      for(var i=0;i<opts.length;i++)opts[i].classList.remove('dsel');
      opt.classList.add('dsel');
      var nb=document.getElementById('dbn');
      if(nb)nb.removeAttribute('disabled');
    }
    return;
  }
  // next
  var nb2=document.getElementById('dbn');
  if(nb2&&(t===nb2||nb2.contains(t))){
    if(!ans[Qs[step].id])return;
    if(step<Qs.length-1){dhRend(step+1);}
    else{dhSv('dtr');setTimeout(dhBR,1800);}
    return;
  }
  // back
  var bk=document.getElementById('dbk');
  if(bk&&(t===bk||bk.contains(t))){if(step>0)dhRend(step-1);return;}
  // restart
  var rs=document.getElementById('drst');
  if(rs&&(t===rs||rs.contains(t))){ans={};step=0;dhSv('dqz');dhRend(0);return;}
},true);

  h+='<button type="button" id="drst" class="dbreset">↺ 重新測驗</button>';
  var rc=document.getElementById('drc');if(rc)rc.innerHTML=h;
  dhSv('drs');
}
